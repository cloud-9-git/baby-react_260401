<!DOCTYPE html>
<html class="light" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>베이비 리액트 이모지 보드</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bagel+Fat+One&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-container-lowest": "#ffffff",
              "error-container": "#ffdad6",
              "on-primary-container": "#005234",
              "inverse-surface": "#27332e",
              "surface-container-highest": "#d8e6de",
              "on-tertiary": "#ffffff",
              "secondary-container": "#ffdbd0",
              "on-tertiary-fixed-variant": "#4e4800",
              tertiary: "#666018",
              "on-error-container": "#93000a",
              "surface-dim": "#d0ddd5",
              "on-error": "#ffffff",
              "on-background": "#121e19",
              "on-secondary": "#ffffff",
              "secondary-fixed-dim": "#edbbac",
              "on-secondary-container": "#613e33",
              secondary: "#7b5549",
              "on-tertiary-fixed": "#1f1c00",
              "tertiary-fixed": "#efe58f",
              outline: "#647c72",
              error: "#ba1a1a",
              "surface-container-high": "#deebe3",
              "surface-container": "#e3f1e9",
              "on-surface": "#121e19",
              background: "#effdf4",
              "primary-fixed-dim": "#00e297",
              "on-tertiary-container": "#4e4800",
              "on-surface-variant": "#344c42",
              "secondary-fixed": "#ffdbd0",
              primary: "#006c46",
              "on-secondary-fixed": "#2f140b",
              "surface-bright": "#effdf4",
              "on-primary-fixed": "#002112",
              "inverse-primary": "#00e297",
              "tertiary-fixed-dim": "#d2c976",
              "primary-fixed": "#4dffb2",
              "surface-container-low": "#e9f7ef",
              "primary-container": "#4dffb2",
              "surface-variant": "#d8e6de",
              "outline-variant": "#b2ccc0",
              "tertiary-container": "#efe58f",
              surface: "#effdf4",
              "inverse-on-surface": "#e6f4ec",
              "on-primary-fixed-variant": "#005234",
              "on-primary": "#ffffff",
              "on-secondary-fixed-variant": "#613e33",
              "surface-tint": "#006c46",
            },
            fontFamily: {
              headline: ["Bagel Fat One", "sans-serif"],
              body: ["Bagel Fat One", "sans-serif"],
              label: ["Bagel Fat One", "sans-serif"],
            },
            borderRadius: {
              DEFAULT: "1rem",
              lg: "2rem",
              xl: "3rem",
              full: "9999px",
            },
          },
        },
      };
    </script>
    <style>
      .material-symbols-outlined {
        font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24;
      }

      .emoji-grid-item {
        transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }

      .emoji-grid-item:active {
        transform: scale(0.9);
      }

      .glass-card {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(20px);
      }

      .panel-card,
      .summary-card {
        border: 1px solid rgba(18, 30, 25, 0.08);
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.72);
        backdrop-filter: blur(14px);
        box-shadow: 0 28px 72px rgba(18, 30, 25, 0.08);
      }

      .eyebrow,
      .summary-label {
        margin: 0;
        font-size: 12px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: #005234;
        font-weight: 700;
      }

      .muted {
        margin: 0;
        color: #647c72;
      }

      .summary-card {
        padding: 18px;
        display: grid;
        gap: 8px;
      }

      .summary-value {
        font-size: 22px;
        line-height: 1.25;
        color: #121e19;
      }

      .tone-sky {
        background: linear-gradient(180deg, rgba(220, 235, 247, 0.86), rgba(255, 255, 255, 0.86));
      }

      .debug-panel-shell {
        display: grid;
        gap: 20px;
      }

      .debug-rail {
        position: relative;
        background:
          linear-gradient(180deg, rgba(7, 16, 7, 0.98), rgba(3, 8, 3, 0.98)),
          #020602;
        color: #91ffb8;
        box-shadow: inset 1px 0 0 rgba(77, 255, 178, 0.14);
      }

      .debug-rail::before {
        content: "";
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(77, 255, 178, 0.035) 1px, transparent 1px),
          linear-gradient(90deg, rgba(77, 255, 178, 0.03) 1px, transparent 1px);
        background-size: 100% 24px, 24px 100%;
        pointer-events: none;
      }

      .debug-rail-header {
        position: relative;
        z-index: 1;
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 24px;
      }

      .debug-rail-icon {
        width: 44px;
        height: 44px;
        border-radius: 9999px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: #4dffb2;
        background: rgba(77, 255, 178, 0.12);
        border: 1px solid rgba(77, 255, 178, 0.24);
        box-shadow: 0 0 24px rgba(77, 255, 178, 0.14);
      }

      .debug-rail-label {
        margin: 0;
        font-size: 10px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: rgba(145, 255, 184, 0.72);
        font-weight: 700;
      }

      .debug-rail-title {
        margin: 4px 0 0;
        font-size: 20px;
        line-height: 1.2;
        color: #d7ffe5;
      }

      .debug-panel-hero,
      .debug-card,
      .debug-sidebar-card {
        border: 1px solid rgba(77, 255, 178, 0.16);
        border-radius: 24px;
        background: linear-gradient(180deg, rgba(8, 22, 10, 0.94), rgba(4, 12, 5, 0.98));
        box-shadow: 0 22px 58px rgba(0, 0, 0, 0.34);
      }

      .debug-panel-hero,
      .debug-card {
        animation: float-up 520ms ease-out both;
      }

      .debug-title {
        margin: 10px 0 12px;
        font-size: clamp(28px, 3vw, 36px);
        line-height: 1.05;
        letter-spacing: -0.04em;
      }

      .debug-metrics {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
        margin-top: 18px;
      }

      .debug-metric-card {
        min-width: 0;
      }

      .debug-card-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 14px;
      }

      .debug-card-head h2 {
        margin: 0;
        color: #d7ffe5;
        font-size: 15px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .debug-emphasis {
        font-size: 18px;
        line-height: 1.45;
        font-weight: 700;
        letter-spacing: -0.02em;
        color: #eafff1;
      }

      .debug-meta,
      .debug-empty {
        margin-bottom: 0;
        color: rgba(145, 255, 184, 0.72);
      }

      .debug-log-list {
        display: grid;
        gap: 10px;
        margin: 0;
        padding-left: 20px;
      }

      .debug-log-item {
        color: #d7ffe5;
      }

      .debug-log-label {
        display: inline-block;
        line-height: 1.45;
      }

      .debug-subtitle {
        color: rgba(145, 255, 184, 0.76);
      }

      .debug-tab-list {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 18px;
      }

      .debug-tab-button {
        appearance: none;
        border: 1px solid rgba(77, 255, 178, 0.18);
        background: rgba(77, 255, 178, 0.06);
        color: rgba(145, 255, 184, 0.78);
        border-radius: 9999px;
        padding: 10px 14px;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        transition: background 180ms ease, color 180ms ease, border-color 180ms ease, box-shadow 180ms ease;
      }

      .debug-tab-button.is-active {
        background: #4dffb2;
        color: #041108;
        border-color: #4dffb2;
        box-shadow: 0 0 0 1px rgba(77, 255, 178, 0.2), 0 0 24px rgba(77, 255, 178, 0.18);
      }

      .debug-tab-panels {
        display: grid;
      }

      .debug-tab-panels > div[hidden] {
        display: none;
      }

      .debug-panel-hero {
        padding: 24px;
      }

      .debug-card {
        padding: 22px;
      }

      .debug-metric-card {
        min-width: 0;
        border: 1px solid rgba(77, 255, 178, 0.14);
        background: linear-gradient(180deg, rgba(10, 28, 12, 0.94), rgba(5, 16, 6, 0.96));
        box-shadow: inset 0 1px 0 rgba(77, 255, 178, 0.04);
      }

      .debug-metric-card .summary-label {
        color: rgba(145, 255, 184, 0.72);
      }

      .debug-metric-card .summary-value {
        color: #4dffb2;
      }

      .debug-resize-handle {
        position: absolute;
        left: -6px;
        top: 0;
        width: 12px;
        height: 100%;
        cursor: col-resize;
        z-index: 2;
      }

      .debug-resize-handle::before {
        content: "";
        position: absolute;
        left: 5px;
        top: 50%;
        transform: translateY(-50%);
        width: 2px;
        height: 96px;
        border-radius: 9999px;
        background: linear-gradient(180deg, rgba(77, 255, 178, 0), rgba(77, 255, 178, 0.8), rgba(77, 255, 178, 0));
        box-shadow: 0 0 18px rgba(77, 255, 178, 0.28);
      }

      .debug-sidebar-card {
        position: relative;
        z-index: 1;
        padding: 20px;
      }

      .debug-sidebar-label {
        margin: 0 0 12px;
        color: rgba(145, 255, 184, 0.72);
      }

      .debug-sidebar-console {
        margin: 0;
        padding: 16px;
        border-radius: 16px;
        background: rgba(1, 5, 2, 0.88);
        border: 1px solid rgba(77, 255, 178, 0.12);
        color: #4dffb2;
        font-size: 12px;
        line-height: 1.5;
        overflow-x: auto;
      }

      .debug-controls {
        border-top: 1px solid rgba(77, 255, 178, 0.16);
      }

      .debug-controls .debug-sidebar-label {
        margin-bottom: 4px;
      }

      .debug-control-button {
        border: 1px solid rgba(77, 255, 178, 0.22);
        background: rgba(77, 255, 178, 0.08);
        color: #d7ffe5;
      }

      .debug-control-button--primary {
        background: #4dffb2;
        color: #041108;
        border-color: #4dffb2;
      }

      .demo-shell {
        display: flex;
        padding-top: 5rem;
      }

      .demo-main {
        width: 100%;
      }

      .demo-footer {
        padding-right: 0;
      }

      @media (min-width: 768px) {
        .demo-main {
          width: calc(100% - var(--debug-rail-width, 32rem));
        }

        .debug-rail {
          width: var(--debug-rail-width, 32rem);
        }

        .demo-footer {
          padding-right: var(--debug-rail-width, 32rem);
        }
      }

      @keyframes float-up {
        from {
          opacity: 0;
          transform: translateY(18px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (max-width: 720px) {
        .debug-metrics {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body
    class="bg-background text-on-background font-body selection:bg-primary-container selection:text-on-primary-container"
  >
    <div data-app-root></div>
    <script type="module" src="/src/demo/main.js"></script>
  </body>
</html>
