<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>코딩 스프린트 보드</title>
    <style>
      :root {
        --bg: #f5efe4;
        --surface: rgba(255, 252, 245, 0.82);
        --surface-strong: #fffaf1;
        --line: rgba(43, 51, 57, 0.12);
        --ink: #1f2a33;
        --muted: #55636d;
        --primary: #c4572e;
        --primary-strong: #8f2f11;
        --shadow: 0 28px 72px rgba(39, 30, 13, 0.14);
        font-family: "Pretendard", "Noto Sans KR", sans-serif;
        color: var(--ink);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at top left, rgba(255, 255, 255, 0.72), transparent 28%),
          radial-gradient(circle at right 15%, rgba(231, 187, 120, 0.28), transparent 22%),
          linear-gradient(145deg, #f8f1e3 0%, #f2e7d0 48%, #efe8db 100%);
        color: var(--ink);
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.22) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.22) 1px, transparent 1px);
        background-size: 48px 48px;
        mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.9), transparent 85%);
      }

      #app {
        width: min(1200px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 40px 0 56px;
      }

      .board-shell {
        display: grid;
        gap: 20px;
        animation: float-up 520ms ease-out both;
      }

      .hero-card,
      .panel-card,
      .summary-card {
        border: 1px solid var(--line);
        border-radius: 24px;
        background: var(--surface);
        backdrop-filter: blur(14px);
        box-shadow: var(--shadow);
      }

      .hero-card {
        display: grid;
        gap: 20px;
        padding: 28px;
      }

      .eyebrow,
      .field-label {
        margin: 0;
        font-size: 12px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--primary-strong);
        font-weight: 700;
      }

      .hero-title {
        margin: 10px 0 12px;
        font-size: clamp(32px, 4vw, 52px);
        line-height: 1;
        letter-spacing: -0.04em;
      }

      .hero-description,
      .muted {
        margin: 0;
        color: var(--muted);
      }

      .hero-stats {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 14px;
      }

      .summary-card {
        padding: 18px;
        display: grid;
        gap: 8px;
      }

      .summary-label {
        color: var(--muted);
        font-size: 14px;
      }

      .summary-value {
        font-size: 22px;
        line-height: 1.25;
      }

      .tone-sun {
        background: linear-gradient(180deg, rgba(255, 230, 184, 0.86), rgba(255, 250, 241, 0.86));
      }

      .tone-mint {
        background: linear-gradient(180deg, rgba(223, 243, 232, 0.86), rgba(255, 250, 241, 0.86));
      }

      .tone-sky {
        background: linear-gradient(180deg, rgba(220, 235, 247, 0.86), rgba(255, 250, 241, 0.86));
      }

      .tone-rose {
        background: linear-gradient(180deg, rgba(248, 221, 224, 0.86), rgba(255, 250, 241, 0.86));
      }

      .board-grid {
        display: grid;
        grid-template-columns: minmax(0, 2fr) minmax(320px, 0.95fr);
        gap: 20px;
      }

      .board-main,
      .insight-stack {
        display: grid;
        gap: 20px;
      }

      .panel-card {
        padding: 22px;
      }

      .panel-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 16px;
      }

      h1,
      h2,
      p {
        margin-top: 0;
      }

      h2 {
        margin-bottom: 6px;
        font-size: 22px;
        letter-spacing: -0.03em;
      }

      .action-row,
      .task-actions,
      .composer-footer {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      .button {
        border: 1px solid rgba(31, 42, 51, 0.15);
        border-radius: 999px;
        padding: 10px 16px;
        background: rgba(255, 255, 255, 0.68);
        color: var(--ink);
        font-weight: 700;
        cursor: pointer;
        transition:
          transform 160ms ease,
          background 160ms ease,
          border-color 160ms ease;
      }

      .button:hover {
        transform: translateY(-1px);
        border-color: rgba(31, 42, 51, 0.28);
        background: rgba(255, 255, 255, 0.96);
      }

      .button-primary {
        background: linear-gradient(135deg, var(--primary) 0%, #dd7b42 100%);
        border-color: transparent;
        color: #fffaf1;
      }

      .button-small {
        padding-inline: 14px;
        font-size: 13px;
      }

      .composer-grid,
      .filter-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
      }

      .field {
        display: grid;
        gap: 8px;
      }

      .span-2 {
        grid-column: 1 / -1;
      }

      input,
      select {
        width: 100%;
        border: 1px solid rgba(31, 42, 51, 0.14);
        border-radius: 16px;
        padding: 12px 14px;
        background: rgba(255, 255, 255, 0.84);
        color: var(--ink);
        font: inherit;
      }

      input:focus,
      select:focus {
        outline: 2px solid rgba(196, 87, 46, 0.2);
        border-color: rgba(196, 87, 46, 0.45);
      }

      .task-list,
      .owner-list {
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .task-list {
        display: grid;
        gap: 12px;
      }

      .task-item {
        display: grid;
        gap: 12px;
        padding: 18px;
        border-radius: 20px;
        border: 1px solid rgba(31, 42, 51, 0.1);
        background: var(--surface-strong);
      }

      .task-item.status-done {
        opacity: 0.84;
      }

      .task-meta,
      .insight-row,
      .owner-list li {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        flex-wrap: wrap;
      }

      .task-title {
        font-size: 18px;
        line-height: 1.35;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 28px;
        border-radius: 999px;
        padding: 4px 10px;
        font-size: 12px;
        font-weight: 800;
      }

      .priority-high {
        background: #ffe0d4;
        color: #8f2f11;
      }

      .priority-medium {
        background: #fcefc9;
        color: #7d5a00;
      }

      .priority-low {
        background: #ddebf1;
        color: #215b71;
      }

      .status-badge.status-todo {
        background: #e7ecff;
        color: #2b4dbb;
      }

      .status-badge.status-doing {
        background: #dff3e8;
        color: #246848;
      }

      .status-badge.status-done {
        background: #efe7f8;
        color: #6b3e8a;
      }

      .focus-card,
      .owner-load,
      .empty-state {
        border-radius: 18px;
        border: 1px solid rgba(31, 42, 51, 0.08);
        background: rgba(255, 255, 255, 0.68);
        padding: 16px;
      }

      .owner-list {
        display: grid;
        gap: 10px;
        margin-top: 10px;
      }

      @keyframes float-up {
        from {
          opacity: 0;
          transform: translateY(18px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (max-width: 960px) {
        .hero-stats,
        .board-grid {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 720px) {
        #app {
          width: min(100vw - 20px, 100%);
          padding: 20px 0 40px;
        }

        .hero-card,
        .panel-card {
          padding: 18px;
          border-radius: 20px;
        }

        .composer-grid,
        .filter-grid {
          grid-template-columns: 1fr;
        }

        .span-2 {
          grid-column: auto;
        }

        .panel-head,
        .task-meta,
        .insight-row,
        .owner-list li {
          align-items: flex-start;
        }
      }
    </style>
  </head>
  <body>
    <div id="app" data-app-root></div>
    <script type="module" src="/src/demo/main.js"></script>
  </body>
</html>
