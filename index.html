<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Virtual DOM Diff &amp; Patch Demo</title>
    <style>
      body {
        margin: 24px;
        font-family: "Pretendard", "Noto Sans KR", sans-serif;
        line-height: 1.5;
        background: #f7f7f5;
      }

      h1,
      h2 {
        margin-top: 0;
      }

      .toolbar {
        display: flex;
        gap: 8px;
        margin-bottom: 16px;
      }

      .container {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
      }

      .panel {
        min-height: 220px;
        padding: 16px;
        border: 1px solid #d0d0d0;
        border-radius: 8px;
        background: #fff;
      }

      #test-area {
        outline: none;
      }

      .history-section {
        margin-top: 24px;
      }

      .history-list {
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .history-list li {
        margin-bottom: 8px;
      }

      .history-toggle {
        width: 100%;
        display: flex;
        justify-content: space-between;
        gap: 12px;
        padding: 12px 14px;
        border: 1px solid #d0d0d0;
        border-radius: 8px;
        background: #fff;
        text-align: left;
        cursor: pointer;
      }

      .history-toggle.active {
        border-color: #2e5cff;
      }

      .history-toggle.open {
        background: #eef3ff;
      }

      .history-meta {
        color: #666;
        font-size: 13px;
        white-space: nowrap;
      }

      .history-compare {
        margin-top: 16px;
      }

      .compare-card {
        padding: 16px;
        border: 1px solid #d0d0d0;
        border-radius: 8px;
        background: #fff;
      }

      .compare-card {
        width: 100%;
      }

      .compare-card h3,
      .compare-card p,
      .compare-card h4 {
        margin-top: 0;
      }

      .compare-summary {
        margin-bottom: 12px;
        color: #666;
      }

      .compare-columns {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .compare-pane h4 {
        margin-bottom: 8px;
      }

      .code-block {
        min-height: 220px;
        margin: 0;
        padding: 12px;
        overflow: auto;
        border-radius: 8px;
        background: #111827;
        color: #f3f4f6;
        font-family: "SFMono-Regular", "JetBrains Mono", monospace;
        font-size: 13px;
        line-height: 1.5;
      }

      .code-line {
        display: block;
        white-space: pre;
      }

      .code-line.added {
        background: #15391e;
        color: #d9ffe3;
      }

      .code-line.removed {
        background: #452021;
        color: #ffd9db;
      }

      .code-line.placeholder {
        color: #9ca3af;
      }

      @media (max-width: 720px) {
        .container {
          grid-template-columns: 1fr;
        }

        .compare-columns {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <h1>Virtual DOM Diff &amp; Patch Demo</h1>

    <div class="toolbar">
      <button id="btn-patch">Patch</button>
      <button id="btn-back" disabled>◀ 뒤로가기</button>
      <button id="btn-forward" disabled>앞으로가기 ▶</button>
    </div>

    <div class="container">
      <div class="panel-wrapper">
        <h2>실제 영역 (읽기 전용)</h2>
        <div class="panel" id="real-area">
          <div>
            <h1>Hello</h1>
            <p style="color: blue">Virtual DOM Demo</p>
            <ul>
              <li>Item 1</li>
              <li>Item 2</li>
              <li>Item 3</li>
            </ul>
          </div>
        </div>
      </div>
      <div class="panel-wrapper">
        <h2>테스트 영역 (편집 가능)</h2>
        <div class="panel" id="test-area" contenteditable="true"></div>
      </div>
    </div>

    <div class="history-section">
      <h2>히스토리 스택</h2>
      <ul class="history-list" id="history-list"></ul>
      <div class="history-compare" id="history-compare"></div>
    </div>

    <script type="module">
      import { createHistory } from "/src/history.js";

      const btnPatch = document.querySelector("#btn-patch");
      const btnBack = document.querySelector("#btn-back");
      const btnForward = document.querySelector("#btn-forward");
      const realArea = document.querySelector("#real-area");
      const testArea = document.querySelector("#test-area");
      const historyList = document.querySelector("#history-list");
      const historyCompare = document.querySelector("#history-compare");
      let openedHistoryIndex = null;

      const initialMarkup = `
        <div>
          <h1>Hello</h1>
          <p style="color: blue">Virtual DOM Demo</p>
          <ul><li>Item 1</li><li>Item 2</li><li>Item 3</li></ul>
        </div>
      `.trim();

      function normalizeMarkup(markup) {
        return markup.trim();
      }

      function createSnapshot(html) {
        const template = document.createElement("template");
        template.innerHTML = html;

        const title =
          template.content.querySelector("h1, h2, h3, p, li")?.textContent?.trim() || "Snapshot";

        return { html, title };
      }

      let history = createHistory(createSnapshot(initialMarkup));

      function syncAreas(snapshot, updateEditor = true) {
        realArea.innerHTML = snapshot.html;

        if (updateEditor) {
          testArea.innerHTML = snapshot.html;
        }
      }

      function getVisibleNodes(node) {
        return Array.from(node.childNodes).filter((child) => {
          return child.nodeType === Node.ELEMENT_NODE || child.textContent.trim();
        });
      }

      function describeNode(node) {
        if (node.nodeType === Node.TEXT_NODE) {
          return `"${node.textContent.replace(/\s+/g, " ").trim()}"`;
        }

        const attrs = Array.from(node.attributes)
          .map((attribute) => `${attribute.name}="${attribute.value}"`)
          .join(" ");

        return attrs
          ? `<${node.tagName.toLowerCase()} ${attrs}>`
          : `<${node.tagName.toLowerCase()}>`;
      }

      function appendTreeLines(node, prefix, isLast, lines) {
        const connector = isLast ? "└─ " : "├─ ";
        lines.push(`${prefix}${connector}${describeNode(node)}`);

        if (node.nodeType !== Node.ELEMENT_NODE) {
          return;
        }

        const children = getVisibleNodes(node);
        const nextPrefix = `${prefix}${isLast ? "   " : "│  "}`;

        children.forEach((child, index) => {
          appendTreeLines(child, nextPrefix, index === children.length - 1, lines);
        });
      }

      function htmlToTreeLines(html) {
        const template = document.createElement("template");
        template.innerHTML = html;

        const roots = getVisibleNodes(template.content);

        if (roots.length === 0) {
          return ["(empty)"];
        }

        const lines = [];

        roots.forEach((root, index) => {
          appendTreeLines(root, "", index === roots.length - 1, lines);
        });

        return lines;
      }

      function diffLines(previousLines, currentLines) {
        const dp = Array.from({ length: previousLines.length + 1 }, () =>
          Array(currentLines.length + 1).fill(0),
        );

        for (let i = previousLines.length - 1; i >= 0; i -= 1) {
          for (let j = currentLines.length - 1; j >= 0; j -= 1) {
            if (previousLines[i] === currentLines[j]) {
              dp[i][j] = dp[i + 1][j + 1] + 1;
            } else {
              dp[i][j] = Math.max(dp[i + 1][j], dp[i][j + 1]);
            }
          }
        }

        const previousAnnotated = [];
        const currentAnnotated = [];
        let i = 0;
        let j = 0;

        while (i < previousLines.length && j < currentLines.length) {
          if (previousLines[i] === currentLines[j]) {
            previousAnnotated.push({ type: "same", line: previousLines[i] });
            currentAnnotated.push({ type: "same", line: currentLines[j] });
            i += 1;
            j += 1;
          } else if (dp[i + 1][j] >= dp[i][j + 1]) {
            previousAnnotated.push({ type: "removed", line: previousLines[i] });
            i += 1;
          } else {
            currentAnnotated.push({ type: "added", line: currentLines[j] });
            j += 1;
          }
        }

        while (i < previousLines.length) {
          previousAnnotated.push({ type: "removed", line: previousLines[i] });
          i += 1;
        }

        while (j < currentLines.length) {
          currentAnnotated.push({ type: "added", line: currentLines[j] });
          j += 1;
        }

        return { previousAnnotated, currentAnnotated };
      }

      function createCodeBlock(lines, emptyMessage) {
        const pre = document.createElement("pre");
        pre.className = "code-block";

        if (lines.length === 0) {
          const line = document.createElement("span");
          line.className = "code-line placeholder";
          line.textContent = emptyMessage;
          pre.append(line);
          return pre;
        }

        lines.forEach(({ type, line }) => {
          const row = document.createElement("span");
          const prefix = type === "added" ? "+ " : type === "removed" ? "- " : "  ";
          row.className = type === "same" ? "code-line" : `code-line ${type}`;
          row.textContent = `${prefix}${line}`;
          pre.append(row);
        });

        return pre;
      }

      function sanitizeOpenedHistoryIndex(length) {
        if (openedHistoryIndex !== null && openedHistoryIndex >= length) {
          openedHistoryIndex = null;
        }
      }

      function renderComparisons(entries, activeIndex) {
        sanitizeOpenedHistoryIndex(entries.length);
        historyCompare.innerHTML = "";

        if (openedHistoryIndex === null) {
          return;
        }

        const index = openedHistoryIndex;
        const currentEntry = entries[index];
        const previousEntry = index > 0 ? entries[index - 1] : null;
        const previousLines = previousEntry ? htmlToTreeLines(previousEntry.html) : [];
        const currentLines = htmlToTreeLines(currentEntry.html);
        const { previousAnnotated, currentAnnotated } = diffLines(previousLines, currentLines);
        const changeCount =
          previousAnnotated.filter((line) => line.type === "removed").length +
          currentAnnotated.filter((line) => line.type === "added").length;

        const card = document.createElement("section");
        card.className = "compare-card";

        const title = document.createElement("h3");
        title.textContent = `${index + 1}. ${currentEntry.title}${
          index === activeIndex ? " (현재 상태)" : ""
        }`;
        card.append(title);

        const summary = document.createElement("p");
        summary.className = "compare-summary";
        summary.textContent =
          index === 0
            ? `초기 스냅샷입니다. 현재 트리의 모든 라인이 추가 상태로 표시됩니다.`
            : `직전 스냅샷 대비 ${changeCount}개 변경 라인을 표시합니다.`;
        card.append(summary);

        const columns = document.createElement("div");
        columns.className = "compare-columns";

        const previousPane = document.createElement("div");
        previousPane.className = "compare-pane";
        previousPane.innerHTML = `<h4>${index === 0 ? "이전 상태 없음" : "이전 상태"}</h4>`;
        previousPane.append(
          createCodeBlock(previousAnnotated, index === 0 ? "(initial)" : "(no previous lines)"),
        );

        const currentPane = document.createElement("div");
        currentPane.className = "compare-pane";
        currentPane.innerHTML = "<h4>현재 상태</h4>";
        currentPane.append(createCodeBlock(currentAnnotated, "(empty)"));

        columns.append(previousPane, currentPane);
        card.append(columns);
        historyCompare.append(card);
      }

      function renderHistory() {
        const entries = history.entries();
        const activeIndex = history.currentIndex();
        const displayEntries = entries.map((entry, index) => ({ entry, index })).reverse();

        historyList.innerHTML = "";

        displayEntries.forEach(({ entry, index }) => {
          const item = document.createElement("li");
          const button = document.createElement("button");
          const isOpen = openedHistoryIndex === index;

          button.type = "button";
          button.className = "history-toggle";
          button.setAttribute("aria-expanded", String(isOpen));

          if (index === activeIndex) {
            button.classList.add("active");
          }

          if (isOpen) {
            button.classList.add("open");
          }

          button.innerHTML = `
            <span>${index + 1}. ${entry.title}</span>
            <span class="history-meta">${isOpen ? "접기" : "비교 열기"}</span>
          `;
          button.addEventListener("click", () => {
            openedHistoryIndex = isOpen ? null : index;

            renderHistory();
          });

          item.append(button);
          historyList.append(item);
        });

        renderComparisons(entries, activeIndex);
        btnBack.disabled = !history.canBack();
        btnForward.disabled = !history.canForward();
      }

      function renderCurrent(updateEditor = true) {
        const current = history.current();

        syncAreas(current, updateEditor);
        renderHistory();
      }

      btnPatch.addEventListener("click", () => {
        const html = normalizeMarkup(testArea.innerHTML);
        const current = history.current();

        if (html === current.html) {
          renderCurrent(false);
          return;
        }

        history.push(createSnapshot(html));
        renderCurrent(false);
      });

      btnBack.addEventListener("click", () => {
        history.back();
        renderCurrent();
      });

      btnForward.addEventListener("click", () => {
        history.forward();
        renderCurrent();
      });

      renderCurrent();
    </script>
  </body>
</html>
